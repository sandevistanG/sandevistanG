name: Metrics
on:
  # Agenda a atualização para rodar automaticamente todos os dias à meia-noite
  schedule: [{cron: "0 0 * * *"}]
  # Permite que você force a atualização manualmente pela aba Actions se quiser ver o resultado na hora
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # O token de segurança que salvamos nos Secrets
          token: ${{ secrets.METRICS_TOKEN }}

          # Configurações de exibição do arquivo de saída
          filename: github-metrics.svg
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          
          # PLUGIN: Linhas de código e commits detalhados
          plugin_lines: yes
          
         # PLUGIN: Gráfico detalhado das linguagens mais 
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, lines
          
          # PLUGIN: Caixa de conquistas (Gera badges divertidos baseados no que você faz no GitHub)
          plugin_achievements: yes
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
